<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fortunatewins.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@100..900&family=Tektur:wght@400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style/register.css">

</head>

<body>

    <div class="container">
        <div class="brand">
            <h1>Fortunate Wins</h1>
            <p>Your Game. Your Passion.</p>
        </div>

        <div class="form-box">
            <h2>Sign up</h2>

           <form id="register-form">
                <div class="input-group">
                    <label>Email or User name</label>
                    <input type="text" id="register-email" placeholder="Enter your email/user name">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="register-password" placeholder="Enter your password">
                </div>
                <div class="input-group">
                    <label>Confirm password</label>
                    <input type="password" id="confirm-password" placeholder="Re-enter your password">
                </div>
                <div class="input-group">
                    <label>Registration key</label>
                    <input type="password" id="register-key" placeholder="Enter key">
                </div>
                <h3 id="success-message" style="font-size:0.9rem;"></h3>
                <button class="btn" id="register-btn">Register</button>
                 <p class="switch">click here to  <a href="/login">Login</a></p>
            </form>

        </div>
    </div>
</body>

<script src="./script/register.js"></script>

</html>
