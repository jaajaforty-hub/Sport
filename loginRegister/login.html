<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>fortunatewins.com</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu,search" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
        <link href="./style/login.css" rel="stylesheet">
    
    </head>

    <body>

        <div class="container">
            <div class="brand">
                <h1>Fortunate Wins</h1>
                <p>Your Game. Your Passion.</p>
            </div>

            <div class="form-box">
                <h2>Login</h2>

                <form id="login-form">
                    <div class="input-group">
                        <label>Email or User name</label>
                        <input type="text" placeholder="Enter your email" id="login-email">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter your password" id="login-password">
                    </div>
                    <h3 style="font-size:0.6rem;" id="login-message"></h3>
                    <button class="btn" id="login-btn">Login</button>
                    <p class="switch">Don't have an account? <a href="/register">Sign up</a></p>
                </form>
            </div>
        </div>

    </body>

   <script src="./script/login.js"></script>

  
</html>
